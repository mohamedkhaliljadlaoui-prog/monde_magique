<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👤 الملف الشخصي - Monde Magique</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/arabic.css">
    <link rel="stylesheet" href="css/cartoon-theme.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --candy-red: #E91E63;
            --candy-orange: #FF9800;
            --candy-yellow: #FFD54F;
            --candy-green: #26C281;
            --candy-teal: #00BCD4;
            --candy-blue: #2196F3;
            --candy-purple: #9C27B0;
            --candy-pink: #EC407A;
            --bg-deep: #0D0221;
            --bg-mid: #1A0033;
            --bg-card: #2B0A54;
            --text-light: #FFFFFF;
            --glow-pink: rgba(236, 64, 122, 0.5);
            --glow-blue: rgba(33, 150, 243, 0.5);
        }
        
        body {
            background: var(--bg-deep);
            background: linear-gradient(135deg, #E91E6322 0%, #2196F3aa 100%);
            font-family: 'Nunito', sans-serif;
            color: var(--text-light);
        }

        .profile-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
        }

        .profile-sky {
            position: relative;
            height: 200px;
            border-radius: 24px;
            background: linear-gradient(180deg, var(--bg-mid) 0%, var(--bg-card) 60%, var(--bg-deep) 100%);
            overflow: hidden;
            box-shadow: 0 0 40px var(--glow-blue), 0 10px 25px rgba(0,0,0,0.25);
            margin-bottom: 20px;
            border: 3px solid var(--candy-yellow);
        }

        .profile-sun {
            position: absolute;
            top: 18px;
            right: 22px;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, var(--candy-yellow) 0%, var(--candy-orange) 60%, #FF9800 100%);
            border-radius: 50%;
            box-shadow: 0 0 30px var(--candy-yellow);
            animation: sunSpin 18s linear infinite;
        }

        .profile-cloud {
            position: absolute;
            top: 22px;
            left: -120px;
            width: 130px;
            height: 55px;
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 30px 10px 0 0 #ffffff, 60px 0 0 0 #ffffff;
            opacity: 0.95;
            animation: cloudFloat 22s linear infinite;
        }

        .profile-cloud.cloud-2 {
            top: 75px;
            width: 160px;
            height: 65px;
            animation-duration: 28s;
            opacity: 0.9;
        }

        .profile-bird {
            position: absolute;
            top: 92px;
            left: 22%;
            font-size: 18px;
            animation: birdFly 8s ease-in-out infinite;
        }

        .profile-bird.bird-2 {
            top: 115px;
            left: 32%;
            font-size: 16px;
            animation-duration: 10s;
        }

        .profile-trees {
            position: absolute;
            bottom: 22px;
            left: 14px;
            display: flex;
            gap: 8px;
        }

        .profile-tree {
            width: 22px;
            height: 34px;
            background: var(--candy-green);
            border-radius: 50% 50% 40% 40%;
            position: relative;
            box-shadow: inset 0 -6px 0 rgba(0, 0, 0, 0.08);
        }

        .profile-tree::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 9px;
            width: 6px;
            height: 14px;
            background: #8d6e63;
            border-radius: 4px;
        }

        .profile-train-track {
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            height: 14px;
            background: repeating-linear-gradient(90deg, #333366 0 24px, #1a1a44 24px 36px);
            border-top: 3px solid var(--candy-purple);
        }

        .profile-train {
            position: absolute;
            bottom: 14px;
            left: -120px;
            width: 120px;
            height: 34px;
            background: linear-gradient(135deg, var(--candy-purple), #5D35A0);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            color: #fff;
            font-weight: bold;
            box-shadow: 0 0 20px var(--candy-purple);
            animation: trainRun 12s linear infinite;
        }

        .profile-train .wheel {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--candy-yellow);
        }
        
        .profile-header {
            background: linear-gradient(135deg, var(--candy-purple) 0%, #5D35A0 100%);
            color: white;
            padding: 30px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
            box-shadow: 0 0 40px var(--glow-pink), 0 10px 25px rgba(33, 150, 243, 0.35);
            border: 3px solid var(--candy-pink);
        }
        
        .profile-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 6px solid var(--candy-yellow);
            background: #fff;
            overflow: hidden;
            box-shadow: 0 0 30px var(--candy-yellow), 0 8px 18px rgba(0,0,0,0.3);
        }
        
        .profile-info {
            flex: 1;
        }
        
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, var(--bg-card) 0%, #2B0A54 100%);
            padding: 20px;
            border-radius: 18px;
            border: 2px solid rgba(236, 64, 122, 0.3);
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--candy-pink);
            box-shadow: 0 8px 25px rgba(236, 64, 122, 0.2);
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--candy-yellow);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #aaa;
        }

        .progress-bar {
            background: rgba(100, 60, 200, 0.3);
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
            border: 2px solid rgba(255, 193, 7, 0.3);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--candy-yellow) 0%, var(--candy-orange) 100%);
            border-radius: 10px;
            transition: width 0.3s;
        }

        .back-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.6) !important;
        }

        .logout-btn:active {
            transform: translateY(0);
        }

        @keyframes sunSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes cloudFloat {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(50px); }
        }

        @keyframes birdFly {
            0%, 100% { transform: translateX(0) translateY(0); }
            50% { transform: translateX(100px) translateY(-20px); }
        }

        @keyframes trainRun {
            0% { transform: translateX(0); }
            100% { transform: translateX(120%); }
        }

        @keyframes shimmer {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            color: var(--candy-yellow);
        }

        h2 {
            color: var(--candy-pink);
            margin: 30px 0 20px 0;
            font-size: 1.8rem;
        }

        small {
            color: #aaa;
        }
    </style>
</head>

        <!-- Stages Progress Section -->
        <h2>🗺️ تقدم الرحلة</h2>
        <div id="stages-progress-container" class="profile-stats">
            <!-- سيتم تعبئته بواسطة JavaScript -->
        </div>

        <!-- Recent Activity -->
        <h2>📝 النشاط الأخير</h2>
        <div id="activity-log" style="display: flex; flex-direction: column; gap: 10px;">
            <!-- سيتم تعبئته بواسطة JavaScript -->

    <script src="js/cartoon-theme.js"></script>
    <script src="js/music-player.js"></script>

    <script>
        // Initialize assistant with Arabic as default for Arabic pages
        document.addEventListener('DOMContentLoaded', () => {
            const pageLanguage = document.documentElement.lang;
            if (window.assistant) {
                window.assistant.setLanguage(pageLanguage === 'ar' ? 'ar' : 'fr');
                window.assistant.show('welcome');
            }
        });

        // STAGES DATA - Same as Dashboard
        const STAGES_DATA = {
            tunisia:  { id:1,  name:'تونس',              icon:'🇹🇳', nameAr:'تونس',              desc:'ابدأ من الوطن',             coordinates:[0.46,0.692], zoom:1.3, color:'#00D68F', description:'اكتشف تونس الخضراء، بلد الحضارات والتاريخ العريق.', capital:'تونس العاصمة', population:'12 مليون',   stations:7, rewards:{coins:100,  diamonds:5,  xp:500}  },
            maghreb:  { id:2,  name:'المغرب العربي',      icon:'🌍', nameAr:'المغرب العربي',      desc:'اكتشف شمال أفريقيا',        coordinates:[0.506,0.344],zoom:1.05,color:'#FFD700', description:'استكشف دول المغرب العربي الخمسة وتاريخها.',       capital:'متعددة',       population:'100 مليون',  stations:7, rewards:{coins:150,  diamonds:8,  xp:750}  },
            africa:   { id:3,  name:'أفريقيا',            icon:'🦁', nameAr:'أفريقيا',            desc:'رحلة في القارة السمراء',    coordinates:[0.556,0.5],  zoom:0.9, color:'#FF3366', description:'اكتشف القارة الأفريقية بتنوعها الثقافي الغني.',   capital:'متعددة',       population:'1.3 مليار', stations:7, rewards:{coins:200,  diamonds:10, xp:1000} },
            europe:   { id:4,  name:'أوروبا',             icon:'🏰', nameAr:'أوروبا',             desc:'اكتشف القارة العجوز',       coordinates:[0.528,0.222],zoom:1.2, color:'#00AAFF', description:'استكشف القارة الأوروبية وحضاراتها المتنوعة.',      capital:'متعددة',       population:'750 مليون', stations:7, rewards:{coins:250,  diamonds:12, xp:1250} },
            asia:     { id:5,  name:'آسيا',               icon:'🏯', nameAr:'آسيا',               desc:'أكبر قارات العالم',         coordinates:[0.792,0.306],zoom:1.0, color:'#9B59B6', description:'اكتشف آسيا، أكبر قارة بثقافاتها المتنوعة.',       capital:'متعددة',       population:'4.6 مليار', stations:7, rewards:{coins:300,  diamonds:15, xp:1500} },
            namerica: { id:6,  name:'أمريكا الشمالية',   icon:'🗽', nameAr:'أمريكا الشمالية',   desc:'العالم الجديد الشمالي',     coordinates:[0.222,0.278],zoom:1.0, color:'#FF9800', description:'استكشف أمريكا الشمالية ومعالمها الطبيعية.',       capital:'متعددة',       population:'580 مليون', stations:7, rewards:{coins:350,  diamonds:18, xp:1750} },
            samerica: { id:7,  name:'أمريكا الجنوبية',   icon:'🌴', nameAr:'أمريكا الجنوبية',   desc:'الأمازون والأنديز',         coordinates:[0.333,0.583],zoom:1.0, color:'#00C9CC', description:'اكتشف أمريكا الجنوبية وغابات الأمازون.',          capital:'متعددة',       population:'430 مليون', stations:7, rewards:{coins:400,  diamonds:20, xp:2000} },
            oceania:  { id:8,  name:'أوقيانوسيا',         icon:'🏝️', nameAr:'أوقيانوسيا',         desc:'جزر المحيط الهادئ',         coordinates:[0.875,0.639],zoom:1.0, color:'#FF69B4', description:'استكشف أستراليا والجزر الجميلة في المحيط الهادئ.',capital:'كانبرا',        population:'42 مليون',  stations:7, rewards:{coins:450,  diamonds:22, xp:2250} },
            poles:    { id:9,  name:'القطبان',            icon:'🐧', nameAr:'القطبان',            desc:'عالم الثلج والجليد',        coordinates:[0.5,0.111],  zoom:0.9, color:'#CCE5FF', description:'اكتشف القطب الشمالي والجنوبي وظواهرهما.',         capital:'لا يوجد',      population:'غير مأهول', stations:7, rewards:{coins:500,  diamonds:25, xp:2500} },
            world:    { id:10, name:'جولة حول العالم',   icon:'🌎', nameAr:'العالم',             desc:'المرحلة النهائية',          coordinates:[0.5,0.389],  zoom:0.6, color:'#FFD700', description:'المرحلة النهائية! اختبار شامل لكل ما تعلمته.',     capital:'العالم',        population:'8 مليار',   stations:7, rewards:{coins:1000, diamonds:50, xp:5000} }
        };

        async function logout() {
            localStorage.removeItem('user_token');
            localStorage.removeItem('user_data');
            window.location.href = 'login.html';
        }
        
        function getStageProgression() {
            const stored = localStorage.getItem('stage_progression');
            if (stored) return JSON.parse(stored);
            return {};
        }

        function calculateLevel(completedStages) {
            return Math.min(completedStages, 10);
        }

        function calculateTotalRewards() {
            const prog = getStageProgression();
            let totalCoins = 0, totalDiamonds = 0, totalXp = 0;
            
            Object.keys(prog).forEach(key => {
                const stage = STAGES_DATA[key];
                if (prog[key].passed && stage) {
                    totalCoins += stage.rewards.coins;
                    totalDiamonds += stage.rewards.diamonds;
                    totalXp += stage.rewards.xp;
                }
            });
            
            return { totalCoins, totalDiamonds, totalXp };
        }

        function getCompletedStages() {
            const prog = getStageProgression();
            return Object.entries(prog).filter(([_, data]) => data.passed);
        }

        function getLevelTitle(level) {
            if (level === 0) return 'بداية الرحلة';
            if (level < 3) return 'مبتدئ';
            if (level < 5) return 'مستكشف';
            if (level < 7) return 'رحالة';
            if (level < 9) return 'خبير';
            if (level < 10) return 'فارس';
            return 'أسطورة 🏆';
        }

        function getLevelColor(level) {
            const colors = [
                '#2196F3', '#00BCD4', '#26C281', '#FFD54F', 
                '#FF9800', '#FF3366', '#9C27B0', '#E91E63',
                '#00AAFF', '#FF69B4'
            ];
            return colors[Math.min(level, 9)];
        }

        async function loadUserProfile() {
            try {
                const localUser = JSON.parse(localStorage.getItem('user_data') || '{}');
                const completedStages = getCompletedStages();
                const level = calculateLevel(completedStages.length);
                const { totalCoins, totalDiamonds, totalXp } = calculateTotalRewards();
                
                // Header Info
                const userName = localUser.name || localUser.username || 'المغامر الشجاع';
                document.getElementById('user-name').textContent = userName;
                document.getElementById('user-level-text').textContent = `المستوى ${level} - ${getLevelTitle(level)}`;
                
                // Level Progress
                const nextLevelXp = (level + 1) * 400;
                const currentLevelXp = level * 400;
                const xpProgress = ((totalXp - currentLevelXp) / (nextLevelXp - currentLevelXp)) * 100;
                document.getElementById('level-progress').style.width = Math.min(xpProgress, 100) + '%';
                document.querySelector('small').textContent = `${Math.max(0, Math.floor(totalXp - currentLevelXp))} / ${Math.floor(nextLevelXp - currentLevelXp)} نقطة خبرة للمستوى التالي`;
                
                // Stats
                document.getElementById('total-coins').textContent = totalCoins;
                document.getElementById('total-diamonds').textContent = totalDiamonds;
                document.getElementById('total-xp').textContent = totalXp;
                document.getElementById('stages-completed').textContent = `${completedStages.length}/10`;
                document.getElementById('quizzes-completed').textContent = completedStages.length;
                document.getElementById('chatbot-questions').textContent = localStorage.getItem('chatbot_messages_count') || 0;
                
                // Achievements
                loadAchievements(completedStages, level);
                
                // Recent Activity
                loadRecentActivity(completedStages);
                
                // Stages Progress
                loadStagesProgress(completedStages, level);
                
            } catch (error) {
                console.error('خطأ تحميل الملف الشخصي:', error);
            }
        }

        function loadAchievements(completedStages, level) {
            const achievements = [];
            
            // Level-based achievements
            if (level >= 1) achievements.push({ icon: '🌟', title: 'بداية الرحلة', desc: 'أكملت أول مرحلة!' });
            if (level >= 3) achievements.push({ icon: '🎯', title: 'المستكشف', desc: 'أكملت 3 مراحل!' });
            if (level >= 5) achievements.push({ icon: '🧭', title: 'الرحالة', desc: 'أكملت 5 مراحل!' });
            if (level >= 7) achievements.push({ icon: '🏅', title: 'الخبير', desc: 'أكملت 7 مراحل!' });
            if (level >= 10) achievements.push({ icon: '👑', title: 'الأسطورة', desc: 'أكملت كل 10 مراحل!' });
            
            // Stage-specific achievements
            const stageNames = Object.keys(STAGES_DATA);
            completedStages.forEach(([key, data]) => {
                const stage = STAGES_DATA[key];
                if (data.score >= 95) {
                    achievements.push({ 
                        icon: '⭐', 
                        title: `متقن: ${stage.name}`, 
                        desc: `أكملت مع ${data.score.toFixed(0)}% (!)`
                    });
                }
            });
            
            const container = document.getElementById('achievements-container');
            container.innerHTML = achievements.map(ach => `
                <div class="stat-card" style="background: linear-gradient(135deg, rgba(255,215,0,.2), rgba(255,152,0,.2)); border-color: rgba(255,215,0,.5);">
                    <div class="stat-icon">${ach.icon}</div>
                    <div style="font-weight: bold; color: #fff;">${ach.title}</div>
                    <div class="stat-label">${ach.desc}</div>
                </div>
            `).join('');
            
            if (achievements.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #aaa; padding: 20px;">ابدأ المراحل لكسب الإنجازات! 🚀</div>';
            }
        }

        function loadRecentActivity(completedStages) {
            const activities = [];
            const prog = getStageProgression();
            
            // Sort by date
            const sorted = [...completedStages].sort((a, b) => {
                const dateA = new Date(prog[a[0]].lastAttempt || 0);
                const dateB = new Date(prog[b[0]].lastAttempt || 0);
                return dateB - dateA;
            });
            
            sorted.slice(0, 5).forEach(([key, data]) => {
                const stage = STAGES_DATA[key];
                const date = new Date(data.lastAttempt);
                const dateStr = date.toLocaleDateString('ar-TN', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                activities.push(`
                    <div style="background: linear-gradient(135deg, rgba(156,39,176,.1), rgba(255,215,0,.1)); padding: 15px; border-radius: 12px; border-right: 4px solid ${stage.color};">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <strong style="color: #fff; font-size: 1.05rem;">${stage.icon} أكملت ${stage.name}</strong>
                                <div style="color: #aaa; font-size: 0.9rem;">النتيجة: ${data.score.toFixed(0)}%</div>
                            </div>
                            <div style="color: #FFD54F; font-weight: bold; white-space: nowrap;">${dateStr}</div>
                        </div>
                    </div>
                `);
            });
            
            if (activities.length === 0) {
                activities.push('<div style="text-align: center; color: #aaa; padding: 20px;">لم تكمل أي مراحل بعد! ابدأ الآن! 🚀</div>');
            }
            
            document.getElementById('activity-log').innerHTML = activities.join('');
        }

        function loadStagesProgress(completedStages, level) {
            const prog = getStageProgression();
            const stageKeys = Object.keys(STAGES_DATA);
            const progressHtml = [];
            
            stageKeys.forEach((key, idx) => {
                const stage = STAGES_DATA[key];
                const stageData = prog[key];
                let status = '🔒 مغلقة';
                let statusColor = '#666';
                let statusBg = 'rgba(100,100,100,.2)';
                
                if (idx === 0) {
                    status = stageData?.passed ? `✅ مكتملة (${stageData.score.toFixed(0)}%)` : '🔓 متاحة';
                    statusColor = stageData?.passed ? '#26C281' : '#FFD54F';
                    statusBg = stageData?.passed ? 'rgba(38,194,129,.2)' : 'rgba(255,215,0,.1)';
                } else {
                    const prevKey = stageKeys[idx - 1];
                    const prevData = prog[prevKey];
                    if (prevData?.passed && prevData.score >= 80) {
                        status = stageData?.passed ? `✅ مكتملة (${stageData.score.toFixed(0)}%)` : '🔓 متاحة';
                        statusColor = stageData?.passed ? '#26C281' : '#FFD54F';
                        statusBg = stageData?.passed ? 'rgba(38,194,129,.2)' : 'rgba(255,215,0,.1)';
                    }
                }
                
                const progressBar = stageData?.passed 
                    ? `<div style="width: 100%; height: 6px; background: linear-gradient(90deg, #26C281, #00BCD4); border-radius: 3px; margin-top: 8px;"></div>`
                    : '';
                
                progressHtml.push(`
                    <div class="stat-card" style="background: linear-gradient(135deg, ${statusBg}, rgba(255,255,255,.05)); border-color: ${statusColor}40;">
                        <div style="text-align: right;">
                            <div style="font-size: 2rem; margin-bottom: 8px;">${stage.icon}</div>
                            <strong style="color: ${statusColor}; font-size: 1.1rem;">${stage.name}</strong>
                            <div style="color: #aaa; font-size: 0.9rem; margin-top: 4px;">${stage.description.substring(0, 40)}...</div>
                            <div style="color: ${statusColor}; font-size: 0.95rem; margin-top: 8px; font-weight: bold;">${status}</div>
                            ${progressBar}
                        </div>
                    </div>
                `);
            });
            
            document.getElementById('stages-progress-container').innerHTML = progressHtml.join('');
        }

        window.addEventListener('DOMContentLoaded', loadUserProfile);
    </script>
