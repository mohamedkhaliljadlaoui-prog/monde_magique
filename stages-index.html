        * {
            margin: 0;
            padding: 0;

        }

        body {
            background: linear-gradient(180deg, #0D0221 0%, #1A0033 40%, #0D0221 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: headerSlide 0.8s ease-out;
        }

        @keyframes headerSlide {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #2196F3 0%, #9C27B0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .header p {
            font-size: 1.3rem;
            color: #555;
            margin-bottom: 20px;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .stat {
            background: white;
            padding: 15px 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.2);
            border: 2px solid rgba(33, 150, 243, 0.2);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #2196F3;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        .stages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .stage-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 35px rgba(33, 150, 243, 0.15);
            border: 2px solid rgba(33, 150, 243, 0.1);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            animation: cardAppear 0.6s ease-out backwards;
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(30px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .stage-card:nth-child(1) { animation-delay: 0.1s; }
        .stage-card:nth-child(2) { animation-delay: 0.2s; }
        .stage-card:nth-child(3) { animation-delay: 0.3s; }
        .stage-card:nth-child(4) { animation-delay: 0.4s; }
        .stage-card:nth-child(5) { animation-delay: 0.5s; }
        .stage-card:nth-child(6) { animation-delay: 0.6s; }
        .stage-card:nth-child(7) { animation-delay: 0.7s; }
        .stage-card:nth-child(8) { animation-delay: 0.8s; }
        .stage-card:nth-child(9) { animation-delay: 0.9s; }
        .stage-card:nth-child(10) { animation-delay: 1s; }

        .stage-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(135deg, transparent 0%, rgba(255, 255, 255, 0.3) 50%, transparent 100%);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .stage-card:hover {
            transform: translateY(-15px) scale(1.05);
            box-shadow: 0 20px 50px rgba(33, 150, 243, 0.3);
            border-color: rgba(33, 150, 243, 0.4);
        }

        .stage-card:active {
            transform: translateY(-10px) scale(1.02);
        }

        .stage-number {

            position: relative;
            z-index: 1;

            margin-bottom: 20px;
            position: relative;
            z-index: 1;

        .info-item {

            border-radius: 10px;

            color: white;
            border: none;

            justify-content: center;

            z-index: 1;

        .stage-btn:hover {

            box-shadow: 0 10px 30px rgba(33, 150, 243, 0.35);

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 5px;
            background: linear-gradient(90deg, #2196F3 0%, #9C27B0 100%);
            width: 0%;

                grid-template-columns: 1fr;

            .stats-bar {
                flex-direction: column;
                align-items: center;
            }
        }
