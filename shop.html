<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛒 Boutique - Monde Magique</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/arabic.css">
    <link rel="stylesheet" href="css/shop.css">
    <link rel="stylesheet" href="css/cartoon-theme.css">
</head>
<body class="cartoon-theme">
    <div class="cartoon-controls">
        <button class="cartoon-toggle" data-theme-toggle data-day-label="🌞 نهار" data-night-label="🌙 ليل">🌞 نهار</button>
        <button class="cartoon-toggle" data-sound-toggle data-sound-on-label="🔊 صوت" data-sound-off-label="🔇 صامت">🔇 صامت</button>
    </div>
    <div class="shop-container">
        <!-- Header -->
        <header class="shop-header">
            <div class="shop-sky">
                <div class="shop-sun"></div>
                <div class="shop-cloud"></div>
                <div class="shop-cloud cloud-2"></div>
                <div class="shop-bird">🐦</div>
            </div>
            <button class="back-btn" onclick="window.location.href='dashboard.html'">
                ← العودة للوحة التحكم
            </button>
            <h1>🛒 متجر التخصيص</h1>
            <div class="user-currency">
                <span class="coins">🪙 <span id="user-coins">0</span></span>
                <span class="diamonds">💎 <span id="user-diamonds">0</span></span>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="shop-tabs">
            <button class="tab-btn active" data-tab="vehicles">🚗 المركبات</button>
            <button class="tab-btn" data-tab="clothes">👕 الملابس</button>
            <button class="tab-btn" data-tab="accessories">🎒 الإكسسوارات</button>
        </nav>

        <!-- Preview Guide -->
        <div class="guide-preview">
            <h3>معاينة المرشد</h3>
            <div class="preview-container">
                <canvas id="guide-canvas" width="400" height="500"></canvas>
            </div>
            <div class="guide-info">
                <p><strong>الاسم:</strong> <span id="guide-name">تيو</span></p>
                <p><strong>المستوى:</strong> <span id="guide-level">1</span></p>
            </div>
        </div>

        <!-- Vehicles Section -->
        <section class="shop-section active" id="vehicles-section">
            <h2>🚗 المركبات</h2>
            <div class="items-grid" id="vehicles-grid">
                <!-- Items will be loaded dynamically -->
            </div>
        </section>

        <!-- Clothes Section -->
        <section class="shop-section" id="clothes-section">
            <h2>👕 الملابس</h2>
            <div class="items-grid" id="clothes-grid">
                <!-- Items will be loaded dynamically -->
            </div>
        </section>

        <!-- Accessories Section -->
        <section class="shop-section" id="accessories-section">
            <h2>🎒 الإكسسوارات</h2>
            <div class="items-grid" id="accessories-grid">
                <!-- Items will be loaded dynamically -->
            </div>
        </section>
    </div>

    <!-- Purchase Confirmation Modal -->
    <div id="purchase-modal" class="modal">
        <div class="modal-content">
            <h3>تأكيد الشراء</h3>
            <div id="modal-item-preview"></div>
            <p id="modal-item-price"></p>
            <div class="modal-actions">
                <button class="btn btn-primary" id="confirm-purchase">تأكيد الشراء</button>
                <button class="btn btn-secondary" id="cancel-purchase">إلغاء</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/economy.js"></script>
    <script src="js/guides.js"></script>
